; Asterisk Dialplan Configuration
; Add this to your /etc/asterisk/extensions.conf

[from-external]
; Route incoming calls to the AI handler
exten => _X.,1,NoOp(Incoming call from ${CALLERID(num)})
 same => n,Answer()
 same => n,Stasis(ai-call-handler)
 same => n,Hangup()

[from-internal]
; For testing from internal extensions
exten => 9995,1,NoOp(Test AI Call Handler)
 same => n,Answer()
 same => n,Stasis(ai-call-handler)
 same => n,Hangup()
