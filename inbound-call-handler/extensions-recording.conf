; AI Call Handler - Recording Context
; This context is used to record user speech and return to Stasis

[ai-record]
exten => s,1,NoOp(AI Recording Start)
 same => n,Set(RECORDING_FILE=${ARG1})
 same => n,Record(${RECORDING_FILE}.wav,3,30,k)
 same => n,NoOp(Recording Complete: ${RECORDING_FILE})
 same => n,Return()
